<!DOCTYPE html>
<html lang="ja">
<!--ハード-->
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<!--css-->
<style>

@font-face {
  font-family: "あずきフォント", "Meiryo", "Hiragino Maru Gothic ProN", sans-serif;;
  src: url("azuki.ttf");
}
/*ボディーに送るやつ*/
body {
  font-family: "あずきフォント", sans-serif;

  background-color: #beced7;
  background-image: repeating-linear-gradient(
    to bottom,
    #beced7,
    #beced7 28px,
    #ffffff 29px
  );
}

/*日付*/
.date {
  color:#888;
  font-size:14px;
  border-bottom:1px dashed #bbb;
  padding-bottom:5px;
  margin-bottom:10px;
}

/*メニュー*/
.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0;

  text-decoration: none;
  background: #e6e8e8;
  padding: 10px 18px;
  border-radius: 10px;
  color: #503b63;
}

.menu a:hover {
  background: #503b63;
  color: white;
}

/*カード*/
.card {
  background-color: #e6e8e8;
  background-image: radial-gradient(circle, #ced9dc 1.5px, transparent 1.5px);
  background-position: 10px 0;
  background-size: 23px 23px;

  padding: 30px;
  margin: 40px auto;
  border-radius: 0px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 600px;


  padding: 30px 30px 30px 50px;
  border-left:2px solid #4fb9c7;
  border-radius: 10px;
}

/*大見出し*/
h1 { color: #5f9db0;
  font-size: 30px;
  font-family: "Meiryo", sans-serif;
}

/*文字*/
p { color: #4f6167;
    font-size: 15px;
}

/*箇条書きするとき*/
.list{
  line-height:1.8;
  color:#4f6167;

  list-style: "♰";
  padding-left: 20px;
  line-height: 1.8;
}
/*ヘッダー*/
.header{
  text-align:center;
  margin-top:20px;
}

.header img{
  width:50%;
  max-width:700px;
  border-radius:15px;

  border:4px solid #7b8292;
  border-radius:15px;
  box-shadow:0 8px 25px rgb(226, 232, 236);
}

/*ファイルに送るやつ*/
html{
  scroll-behavior:smooth;
}

/*もくじ*/
.wiki{
  background-color: #e6e8e8;
  background-image: linear-gradient(0deg, transparent calc(100% - 1px), #f0f0f0 calc(100% - 1px)),
                    linear-gradient(90deg, transparent calc(100% - 1px), #f0f0f0 calc(100% - 1px));
  background-size: 16px 16px;
  background-repeat: repeat;
  background-position: center center;

  padding: 30px;
  margin: 40px auto;
  border-radius: 0px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 600px;

  padding: 30px 30px 30px 50px;
  border-left:2px solid #4f7bc7;
  border-radius: 10px;
}

/*写真など*/
.card img{
  width:100%;
  max-width:500px;
  border-radius:10px;
  margin:10px 0;
}

</style>

</head>

<!--ボディー-->
<body>

<!--上のメニュー-->
<nav class="menu">
  <a href="れあぬん日記.html">ほーむ🏠</a>
  <a href="kizi.html">きじ📃</a>
  <a href="nikki.html">にっき📓</a>
  <a href="purohu.html">ぷろふ🪪</a>
</nav>

<!--ヘッダー-->
<header class="header">
  <img src="reanu_header.png" alt="れあぬん日記ヘッダー">
</header>

<!--カード-->
<div class="card" id="#aiueo">

  <h1>3月の日記</h1>
<a href="2026.3.17.html">サイト作ってみた件</a>
</div>

<!--もくじ-->
<ul class="wiki">
  <h1>もくじ</h1>
<div class="list">
<li><a href="#aiueo">見出し</a></li>
</div></ul></div>

</body>
</html>
